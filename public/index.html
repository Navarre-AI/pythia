<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pythia</title>
  <style>
    :root { --bg:#f5f6f9; --panel:#ffffff; --panel2:#eef0f7; --line:#e6e8f1; --ink:#1e1c2e; --muted:#6c6b80; --accent:#6d5bb8; --accent2:#8b76e0; --good:#2e9e6b; --bad:#d0555f; --shadow:0 1px 2px rgba(28,24,60,.05),0 2px 8px rgba(28,24,60,.04); }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; }
    body { display:flex; height:100vh; background:var(--bg); color:var(--ink); font:14.5px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
    button { font:inherit; cursor:pointer; border:0; }

    .side { width:270px; flex:none; background:#fbfbfe; border-right:1px solid var(--line); display:flex; flex-direction:column; }
    .side-top { padding:15px 15px 10px; display:flex; align-items:center; gap:8px; }
    .brand { font-size:16px; font-weight:600; letter-spacing:.05em; display:flex; align-items:center; gap:8px; }
    .brand .g { color:var(--accent2); font-size:18px; }
    .newbtn { margin-left:auto; height:30px; padding:0 12px; border-radius:8px; background:var(--accent); color:#fff; font-size:13px; font-weight:600; }
    .side-list { flex:1; overflow-y:auto; padding:6px 8px; }
    .navitem { display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:9px; color:var(--muted); cursor:pointer; font-size:13.5px; }
    .navitem:hover { background:var(--panel); color:var(--ink); }
    .navitem.on { background:var(--panel2); color:var(--ink); }
    .sec { color:#9a98ad; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; padding:15px 12px 6px; }
    .crow { display:flex; align-items:center; gap:6px; padding:9px 11px; border-radius:9px; color:var(--muted); cursor:pointer; font-size:13.5px; position:relative; }
    .crow:hover { background:var(--panel); color:var(--ink); }
    .crow.on { background:var(--panel2); color:var(--ink); box-shadow:inset 3px 0 0 var(--accent2); font-weight:500; }
    .crow .ct { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .crow .gear { opacity:0; color:var(--muted); font-size:15px; background:none; padding:0 2px; }
    .crow:hover .gear { opacity:.8; }
    .menu { position:absolute; right:6px; top:34px; z-index:70; background:var(--panel2); border:1px solid var(--line); border-radius:9px; box-shadow:0 6px 20px rgba(28,24,60,.14); overflow:hidden; min-width:130px; }
    .menu button { display:block; width:100%; text-align:left; padding:9px 13px; background:none; color:var(--ink); font-size:13px; }
    .menu button:hover { background:var(--line); }
    .side-foot { padding:10px 12px; border-top:1px solid var(--line); color:#7d7099; font-size:11.5px; }
    .footbtn { width:100%; display:flex; align-items:center; gap:8px; padding:9px 11px; border-radius:9px; background:var(--panel); color:var(--ink); font-size:13px; margin-bottom:8px; }
    .footbtn:hover { background:var(--panel2); color:var(--accent2); }

    .main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
    .main-head { padding:13px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
    .main-head .title { font-size:15px; font-weight:600; }
    .iconbtn { margin-left:auto; height:34px; padding:0 13px; gap:7px; border-radius:9px; background:var(--panel); color:var(--ink); font-size:13px; }
    .iconbtn:hover { background:var(--panel2); color:var(--accent2); }
    .view { flex:1; overflow-y:auto; }

    #log { padding:22px 20px; display:flex; flex-direction:column; gap:14px; max-width:920px; margin:0 auto; }
    .msg { max-width:86%; padding:11px 15px; border-radius:14px; white-space:pre-wrap; word-wrap:break-word; }
    .user { align-self:flex-end; background:var(--accent); color:#fff; }
    .bot { align-self:flex-start; background:var(--panel); border:1px solid var(--line); box-shadow:var(--shadow); }
    .meta { align-self:center; color:var(--muted); font-size:12px; }
    .stamp { align-self:flex-end; color:#9a98ad; font-size:11px; margin:2px 2px -6px 0; }
    .chips { align-self:flex-start; display:flex; flex-wrap:wrap; gap:8px; margin-top:2px; }
    .chip { padding:8px 13px; border-radius:18px; background:var(--panel2); border:1px solid var(--line); color:var(--ink); font-size:13px; }
    .chip:hover { border-color:var(--accent2); color:var(--accent2); }
    .composer { padding:14px 20px; border-top:1px solid var(--line); display:flex; gap:8px; max-width:920px; margin:0 auto; width:100%; }
    textarea { flex:1; resize:none; height:50px; padding:12px 14px; border-radius:12px; border:1px solid var(--line); background:var(--panel); color:var(--ink); font:inherit; line-height:1.35; }
    .sendbtn { padding:0 22px; border-radius:12px; background:var(--accent); color:#fff; font-weight:600; }
    .sendbtn:disabled { opacity:.5; }

    .card { align-self:stretch; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 17px; margin-top:2px; box-shadow:var(--shadow); }
    .card-h { display:flex; align-items:center; font-weight:600; font-size:14px; margin-bottom:13px; }
    .card-h .tools { margin-left:auto; display:flex; gap:6px; }
    .card-h .tbtn { color:var(--muted); font-size:12px; background:none; padding:2px 6px; border-radius:6px; }
    .card-h .tbtn:hover { color:var(--accent2); background:var(--panel2); }
    .bars { display:flex; flex-direction:column; gap:7px; }
    .bar-row { display:flex; align-items:center; gap:10px; font-size:13px; }
    .bar-lbl { width:34%; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { flex:1; background:#eceef5; border-radius:5px; height:16px; overflow:hidden; }
    .bar-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:5px; min-width:2px; }
    .bar-val { width:96px; text-align:right; font-variant-numeric:tabular-nums; }
    table.tbl { width:100%; border-collapse:collapse; font-size:13px; }
    table.tbl td, table.tbl th { padding:6px 9px; border-bottom:1px solid var(--line); text-align:left; white-space:nowrap; }
    table.tbl td.n { text-align:right; font-variant-numeric:tabular-nums; }
    table.tbl th { color:var(--muted); font-weight:500; }
    .tbl-scroll { overflow-x:auto; max-height:420px; }

    .dash { padding:22px; max-width:1050px; margin:0 auto; }
    .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:16px; }
    .kpi { background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:14px 16px; box-shadow:var(--shadow); }
    .kpi .k { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; }
    .kpi .v { font-size:24px; font-weight:600; margin-top:5px; font-variant-numeric:tabular-nums; }
    .insights { background:linear-gradient(135deg,#f2eefc,#fbfaff); border:1px solid #e7e0f8; border-radius:13px; padding:14px 18px; margin-bottom:16px; box-shadow:var(--shadow); }
    .insights .ins-h { color:var(--accent); font-weight:600; font-size:13px; margin-bottom:8px; }
    .insights ul { margin:0; padding-left:18px; } .insights li { margin:5px 0; font-size:13.5px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media (max-width:820px){ .grid2 { grid-template-columns:1fr; } }

    .set-sec { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:16px 0 6px; }
    .set-row { display:flex; align-items:center; gap:8px; padding:4px 0; }
    .srcopt { padding:6px 13px; background:var(--panel); color:var(--muted); font-size:12px; cursor:pointer; }
    .srcopt.on { background:var(--accent); color:#fff; }
    .trow { display:flex; align-items:center; gap:10px; padding:7px 2px; border-bottom:1px solid var(--line); font-size:13.5px; }
    .trow input[type=checkbox] { width:17px; height:17px; accent-color:var(--accent); flex:none; cursor:pointer; }
    .trow .tname { width:160px; background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:4px 8px; color:var(--ink); font:inherit; font-size:13px; }
    .trow .treal { color:var(--muted); font-size:12px; }
    .trow .tbadge { margin-left:auto; font-size:11px; padding:2px 9px; border-radius:999px; white-space:nowrap; }
    .tbadge.on { background:#e6f4ec; color:#2e9e6b; } .tbadge.off { background:#eef0f4; color:#9a98ad; }

    .sync-wrap { max-width:640px; margin:44px auto; padding:0 22px; }
    .sync-wrap h2 { font-size:1.15rem; margin:0; }
    .sync-overall { height:10px; background:#eceef5; border-radius:6px; overflow:hidden; margin:16px 0 22px; }
    .sync-overall > div { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); width:0; transition:width .3s ease; }
    .sync-t { display:flex; align-items:center; gap:12px; padding:8px 0; font-size:13.5px; }
    .sync-t .nm { width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sync-t .track { flex:1; height:8px; background:#eceef5; border-radius:5px; overflow:hidden; }
    .sync-t .track > div { height:100%; background:var(--accent2); width:0; transition:width .25s ease; }
    .sync-t .st { width:110px; text-align:right; color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
    .sync-t.done .track > div { background:var(--good); }
    .sync-t.done .st { color:var(--good); }
    .sync-t.dropped .nm { color:var(--muted); text-decoration:line-through; }
    .sync-t.dropped .st { color:var(--bad); }

    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:40; }
    .overlay.open { display:flex; }
    .panel { width:min(640px,94vw); max-height:84vh; background:var(--panel); border:1px solid var(--line); border-radius:14px; display:flex; flex-direction:column; }
    .p-head { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:baseline; }
    .p-list { overflow-y:auto; padding:6px 18px; }
    .p-row { display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid #2a2340; font-size:13.5px; }
    .p-foot { display:flex; gap:10px; padding:13px 18px; border-top:1px solid var(--line); align-items:center; }
    .p-foot .sp { flex:1; }
    .link { background:none; color:var(--accent2); font-size:12.5px; }
    .btn { padding:7px 15px; border-radius:9px; background:var(--accent); color:#fff; font-weight:600; }
    .btn.ghost { background:var(--panel2); color:var(--ink); }
  </style>
</head>
<body>
  <aside class="side">
    <div class="side-top">
      <span class="brand"><span class="g">◈</span> Pythia</span>
      <button class="newbtn" id="newBtn">+ New</button>
    </div>
    <div class="side-list">
      <div class="navitem" id="navOverview"><span>▚</span> Overview</div>
      <div class="sec">Conversations</div>
      <div id="convoList"></div>
      <div class="sec">Saved reports</div>
      <div id="reportList"></div>
      <div style="padding:6px 8px"><button id="genBtn" class="chip" style="width:100%;text-align:center;justify-content:center">✨ Generate reports from my data</button></div>
    </div>
    <div class="side-foot">
      <button class="footbtn" id="settingsBtn"><span>⚙</span> Settings &amp; tables</button>
      <button class="footbtn" id="dataBtn"><span>▤</span> Browse data</button>
      <div id="dbFoot"></div>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <span class="title" id="viewTitle">Ask Pythia</span>
      <div style="margin-left:auto;position:relative">
        <button class="iconbtn" id="chatMenuBtn" title="This conversation">⋯</button>
        <div class="menu" id="chatMenu" style="display:none;right:0;top:40px">
          <button data-a="rename">Rename</button>
          <button data-a="export">Export</button>
          <button data-a="delete">Delete</button>
        </div>
      </div>
    </div>
    <div class="view" id="chatView"><div id="log"></div></div>
    <div class="view" id="dashView" style="display:none"></div>
    <div class="view" id="syncView" style="display:none">
      <div class="sync-wrap">
        <h2 id="syncTitle">Building your local copy…</h2>
        <div id="syncSub" style="color:var(--muted);font-size:13px;margin-top:2px"></div>
        <div class="sync-overall"><div id="syncOverall"></div></div>
        <div id="syncTables"></div>
      </div>
    </div>
    <form class="composer" id="composer">
      <textarea id="input" placeholder="Ask anything about your data, in plain English" autofocus></textarea>
      <button class="sendbtn" id="send" type="submit">Ask</button>
    </form>
  </main>

  <div class="overlay" id="dataOverlay">
    <div class="panel">
      <div class="p-head"><strong id="dataTitle">Data</strong><span id="dataSub" style="color:var(--muted);font-size:12px"></span></div>
      <div class="p-list" id="dataList"></div>
      <div class="p-foot"><span class="sp"></span><button class="btn ghost" id="dataClose">Close</button></div>
    </div>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="panel" style="width:min(720px,95vw)">
      <div class="p-head"><strong>Settings</strong><span id="setSub" style="color:var(--muted);font-size:12px"></span></div>
      <div class="p-list">
        <div class="set-sec">Local copy</div>
        <div class="set-row">
          <span id="syncStatus" style="color:var(--muted);font-size:12.5px"></span>
          <span class="sp"></span>
          <button class="btn ghost" id="syncBtn">⟳ Sync now</button>
        </div>
        <div class="set-sec">Tables Pythia uses <span style="font-weight:400;text-transform:none;letter-spacing:0">— check to include, uncheck to remove. Rename to set a friendly name.</span></div>
        <div id="tableList"></div>
        <div class="set-sec">Reset</div>
        <div class="set-row"><button class="btn ghost" id="resetBtn">Reset to fresh install</button><span style="color:var(--muted);font-size:12px">Clears reports, conversations, table selection, and the overview design.</span></div>
      </div>
      <div class="p-foot"><span id="setMsg" style="color:var(--muted);font-size:12px"></span><span class="sp"></span><button class="btn ghost" id="setClose">Close</button><button class="btn" id="setApply">Save &amp; apply</button></div>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const el = (t, c) => { const e = document.createElement(t); if (c) e.className = c; return e; };
const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
const qs = new URLSearchParams(location.search);
const KEY = qs.get("key") ? "?key=" + encodeURIComponent(qs.get("key")) : "";
const api = (p) => p + (KEY && p.includes("?") ? "&" + KEY.slice(1) : KEY);
const log = $("log"), input = $("input"), send = $("send"), composer = $("composer"), chatView = $("chatView");
let history = [], conversationId = null;
const scrollBottom = () => { chatView.scrollTop = chatView.scrollHeight; };

// Coarse relative time: 9:30am / yesterday / Monday / last week / Jul 2
function fmtRel(ts) {
  if (!ts) return "";
  const d = new Date(ts), now = new Date();
  const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }).replace(" ", "").toLowerCase();
  const startOf = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const days = Math.round((startOf(now) - startOf(d)) / 86400000);
  if (days <= 0) return time;
  if (days === 1) return "yesterday";
  if (days < 7) return d.toLocaleDateString([], { weekday: "long" });
  if (days < 14) return "last week";
  return d.toLocaleDateString([], { month: "short", day: "numeric" });
}

const fmtC = (v) => {
  if (typeof v !== "number") return v; const a = Math.abs(v);
  if (a >= 1e9) return (v/1e9).toFixed(1)+"B"; if (a >= 1e6) return (v/1e6).toFixed(1)+"M";
  if (a >= 1e3) return (v/1e3).toFixed(1)+"K"; return v.toLocaleString(undefined,{maximumFractionDigits:0});
};
const fmtN = (v) => typeof v === "number" ? v.toLocaleString(undefined,{maximumFractionDigits:2}) : v;
const GREETING = "Ask me anything about your data in plain English — I answer with real numbers and charts, no SQL, no spreadsheets. Try one of these:";
const STARTERS = ["What's in this data?", "What are the trends over time?", "What are the biggest categories?", "What stands out?", "Anything that needs attention?"];

function add(role, text) { const e = el("div", "msg " + (role === "user" ? "user" : "bot")); e.textContent = text; log.appendChild(e); scrollBottom(); return e; }
function metaLine(text) { const e = el("div", "meta"); e.textContent = text; log.appendChild(e); scrollBottom(); return e; }

function barChart(rows) {
  const max = Math.max(1, ...rows.map((r) => Math.abs(+r.value || 0)));
  const w = el("div", "bars");
  for (const r of rows.slice(0, 30)) {
    const row = el("div", "bar-row");
    const lbl = el("div", "bar-lbl"); lbl.textContent = r.label; lbl.title = r.label;
    const track = el("div", "bar-track"); const fill = el("div", "bar-fill"); fill.style.width = (Math.abs(+r.value||0)/max*100)+"%"; track.appendChild(fill);
    const val = el("div", "bar-val"); val.textContent = fmtC(+r.value); val.title = fmtN(+r.value);
    row.append(lbl, track, val); w.appendChild(row);
  }
  return w;
}
function lineChart(rows) {
  const W = 660, H = 190, pad = 34;
  const vals = rows.map((r) => +r.value || 0);
  const max = Math.max(...vals, 0), min = Math.min(...vals, 0);
  const x = (i) => pad + i * (W - 2*pad) / Math.max(1, rows.length - 1);
  const y = (v) => H - pad - (v - min) / (max - min || 1) * (H - 2*pad);
  const pts = rows.map((r, i) => `${x(i).toFixed(1)},${y(+r.value||0).toFixed(1)}`).join(" ");
  const ticks = rows.filter((_, i) => i % Math.ceil(rows.length/8) === 0);
  const longLbl = ticks.some((r) => String(r.label ?? "").length > 5);
  const wrap = el("div");
  wrap.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="100%">
    <polyline fill="none" stroke="#8b76e0" stroke-width="2.5" points="${pts}"/>
    ${rows.map((r,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(+r.value||0).toFixed(1)}" r="2.5" fill="#8b76e0"/>`).join("")}
    <text x="${pad}" y="14" fill="#8a8898" font-size="11">${fmtC(max)}</text>
    ${ticks.map((r)=>{ const cx = x(rows.indexOf(r)).toFixed(1); const lb = esc(String(r.label ?? ""));
      return longLbl
        ? `<text x="${cx}" y="${H-6}" fill="#8a8898" font-size="9.5" text-anchor="end" transform="rotate(-28 ${cx} ${H-6})">${lb}</text>`
        : `<text x="${cx}" y="${H-8}" fill="#8a8898" font-size="10" text-anchor="middle">${lb}</text>`; }).join("")}
  </svg>`;
  return wrap;
}
function fullTable(a) {
  const cols = a.columns || (a.rows[0] ? Object.keys(a.rows[0]) : []);
  const wrap = el("div", "tbl-scroll");
  const t = el("table", "tbl");
  t.innerHTML = "<tr>" + cols.map((c)=>`<th>${c}</th>`).join("") + "</tr>" +
    a.rows.map((r)=>"<tr>"+cols.map((c)=>{const v=r[c];const num=typeof v==="number";return `<td class="${num?"n":""}">${num?fmtN(v):(v??"")}</td>`}).join("")+"</tr>").join("");
  wrap.appendChild(t); return wrap;
}
function artifactCard(a) {
  const card = el("div", "card");
  const h = el("div", "card-h"); h.textContent = a.title || "Result";
  const tools = el("div", "tools");
  const isChart = a.chartType === "bar" || a.chartType === "line";
  const body = el("div");
  let mode = a.chartType === "table" ? "table" : (isChart ? "chart" : "table");
  const draw = () => {
    body.innerHTML = "";
    if (mode === "chart" && isChart && a.series) body.appendChild(a.chartType === "line" ? lineChart(a.series) : barChart(a.series));
    else body.appendChild(fullTable(a));
  };
  if (isChart && a.series) {
    const flip = el("button", "tbtn"); flip.textContent = "▦ table";
    flip.onclick = () => { mode = mode === "chart" ? "table" : "chart"; flip.textContent = mode === "chart" ? "▦ table" : "▤ chart"; draw(); };
    tools.appendChild(flip);
  }
  if (a.reportId) {
    const pdf = el("button", "tbtn"); pdf.textContent = "⤓ PDF";
    pdf.onclick = () => { const w = window.open(api("/report/" + a.reportId), "_blank"); if (w) w.addEventListener("load", () => setTimeout(() => w.print(), 250)); };
    tools.appendChild(pdf);
  }
  if (a.saveable) {
    const save = el("button", "tbtn"); save.textContent = "★ save report";
    save.onclick = async () => { const name = prompt("Save this report as:", a.title || "Report"); if (!name) return;
      await fetch(api("/api/reports"), { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ name, description:a.title||"", sql:a.sql, chart:a.chart||null }) });
      save.textContent = "✓ saved"; loadReports(); };
    tools.appendChild(save);
  }
  h.appendChild(tools); card.append(h, body); draw();
  return card;
}
function renderAssistant(text, artifacts, meta) {
  if (meta && meta.ts) { const s = el("div", "stamp"); s.textContent = "as of " + fmtRel(meta.ts); log.appendChild(s); }
  if (text) add("bot", text);
  for (const a of (artifacts || [])) log.appendChild(artifactCard(a));
  scrollBottom();
}
async function showFollowups(question, reply) {
  try {
    const j = await (await fetch(api("/api/followups"), { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ question, reply }) })).json();
    if (!j.followups || !j.followups.length) return;
    const chips = el("div", "chips");
    for (const q of j.followups) { const b = el("button", "chip"); b.textContent = q; b.onclick = () => { input.value = q; composer.requestSubmit(); }; chips.appendChild(b); }
    log.appendChild(chips); scrollBottom();
  } catch {}
}

function showChat() { $("chatView").style.display = ""; $("dashView").style.display = "none"; $("syncView").style.display = "none"; $("composer").style.display = ""; $("navOverview").classList.remove("on"); }
async function showOverview() {
  $("chatView").style.display = "none"; $("composer").style.display = "none"; $("dashView").style.display = "";
  $("navOverview").classList.add("on"); document.querySelectorAll(".crow").forEach((e)=>e.classList.remove("on"));
  $("viewTitle").textContent = "Overview";
  const dash = $("dashView");
  dash.innerHTML = '<div style="padding:26px;color:var(--muted)">Loading overview…</div>';
  try {
    // The dashboard is AI-designed per database: the server returns whatever
    // KPIs and charts fit THIS schema. First build takes a few seconds.
    dash.innerHTML = '<div style="padding:26px;color:var(--muted)">Designing the overview for your data… (first time takes a few seconds)</div>';
    const d = await (await fetch(api("/api/overview"))).json();
    if (d.error) { dash.innerHTML = '<div style="padding:26px;color:var(--bad)">'+esc(d.error)+'</div>'; return; }
    const fmtKpi = (k) => k.format === "money" ? "$"+fmtC(k.value) : k.format === "percent" ? fmtC(k.value)+"%" : fmtC(k.value);
    const kpiCard = (k) => `<div class="kpi"><div class="k">${esc(k.label)}</div><div class="v">${esc(fmtKpi(k))}</div></div>`;
    dash.innerHTML = `<div class="dash">
      <div class="kpis">${(d.kpis||[]).map(kpiCard).join("")}</div>
      <div class="insights" id="ov-insights" style="display:none"><div class="ins-h">✦ What stands out</div><ul id="ov-ins-list"></ul></div>
      <div class="grid2">${(d.charts||[]).map((c,i)=>`<div class="card"><div class="card-h">${esc(c.title)}</div><div id="ov-c${i}"></div></div>`).join("")}</div></div>`;
    (d.charts||[]).forEach((c,i) => {
      const rows = c.rows.map((r)=>({ label: r[c.x], value: Number(r[c.y]) || 0 }));
      dash.querySelector("#ov-c"+i).appendChild(c.type === "line" ? lineChart(rows) : barChart(rows));
    });
    // insights load async so the dashboard is instant
    fetch(api("/api/overview/insights"), { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ kpis:d.kpis, charts:(d.charts||[]).map((c)=>({ title:c.title, rows:c.rows.slice(0,12) })) }) })
      .then((r)=>r.json()).then((j)=>{ if (j.insights && j.insights.length) { $("ov-ins-list").innerHTML = j.insights.map((s)=>`<li>${esc(s)}</li>`).join(""); $("ov-insights").style.display = ""; } }).catch(()=>{});
  } catch (e) { dash.innerHTML = '<div style="padding:26px;color:var(--bad)">Could not load overview.</div>'; }
}
$("navOverview").onclick = showOverview;

async function loadConvos() {
  try {
    const d = await (await fetch(api("/api/conversations"))).json();
    const list = $("convoList"); list.innerHTML = "";
    for (const c of (d.conversations || [])) {
      const row = el("div", "crow"); row.dataset.id = c.id;
      if (c.id === conversationId) row.classList.add("on");
      const t = el("div", "ct"); t.textContent = c.title || "(untitled)"; t.title = c.title || "";
      const gear = el("button", "gear"); gear.textContent = "⋯";
      const menu = el("div", "menu"); menu.style.display = "none";
      menu.innerHTML = '<button data-a="rename">Rename</button><button data-a="delete">Delete</button>';
      gear.onclick = (e) => { e.stopPropagation(); document.querySelectorAll(".menu").forEach((m)=>{ if(m!==menu) m.style.display="none"; }); menu.style.display = menu.style.display==="none"?"block":"none"; };
      menu.onclick = async (e) => { const a = e.target.dataset.a; if (!a) return; e.stopPropagation(); menu.style.display="none";
        if (a === "rename") { const nt = prompt("Rename conversation:", c.title); if (nt && nt.trim()) { await fetch(api("/api/conversations/"+c.id), {method:"PATCH",headers:{"content-type":"application/json"},body:JSON.stringify({title:nt.trim()})}); loadConvos(); } }
        else if (a === "delete" && confirm("Delete this conversation?")) { await fetch(api("/api/conversations/"+c.id), {method:"DELETE"}); if (conversationId===c.id) newChat(); loadConvos(); } };
      row.onclick = () => openConvo(c.id);
      row.append(t, gear, menu); list.appendChild(row);
    }
  } catch {}
}
async function openConvo(id) {
  showChat();
  const c = await (await fetch(api("/api/conversations/"+id))).json();
  if (c.error) return;
  conversationId = c.id; history = []; log.innerHTML = "";
  $("viewTitle").textContent = c.title || "Conversation";
  for (const m of (c.messages || [])) {
    if (m.role === "user") { add("user", m.content); history.push({ role:"user", content:m.content }); }
    else { renderAssistant(m.content, m.artifacts, { source:m.source, ts:m.ts }); history.push({ role:"assistant", content:m.content }); }
  }
  document.querySelectorAll(".crow").forEach((e)=>e.classList.toggle("on", e.dataset.id===id));
  document.querySelectorAll(".rep").forEach((e)=>e.classList.remove("on"));
  scrollBottom(); input.focus();
}
function newChat() { conversationId = null; resetChat(); loadConvos(); }

function resetChat() {
  showChat();
  history = []; log.innerHTML = ""; $("viewTitle").textContent = "Ask Pythia";
  add("bot", GREETING);
  const chips = el("div", "chips");
  for (const q of STARTERS) { const b = el("button", "chip"); b.textContent = q; b.onclick = () => { input.value = q; composer.requestSubmit(); }; chips.appendChild(b); }
  log.appendChild(chips); input.focus();
}

async function loadReports() {
  const list = $("reportList");
  try {
    const reps = await (await fetch(api("/api/reports"))).json();
    list.innerHTML = "";
    for (const r of reps) {
      const row = el("div", "crow"); row.dataset.id = r.id;
      const t = el("div", "ct"); t.textContent = r.name; t.title = r.description || "";
      const gear = el("button", "gear"); gear.textContent = "⋯";
      const menu = el("div", "menu"); menu.style.display = "none";
      menu.innerHTML = '<button data-a="duplicate">Duplicate</button><button data-a="delete">Delete</button>';
      gear.onclick = (e) => { e.stopPropagation(); document.querySelectorAll(".menu").forEach((m)=>{ if(m!==menu) m.style.display="none"; }); menu.style.display = menu.style.display==="none"?"block":"none"; };
      menu.onclick = async (e) => { const a = e.target.dataset.a; if (!a) return; e.stopPropagation(); menu.style.display="none";
        if (a === "duplicate") { await fetch(api("/api/reports/"+r.id+"/duplicate"), {method:"POST"}); loadReports(); }
        else if (a === "delete" && confirm("Delete “"+r.name+"”?")) { await fetch(api("/api/reports/"+r.id), {method:"DELETE"}); loadReports(); } };
      row.onclick = () => runSaved(r);
      row.append(t, gear, menu); list.appendChild(row);
    }
  } catch (e) {}
}
document.addEventListener("click", () => document.querySelectorAll(".menu").forEach((m)=>m.style.display="none"));

async function runSaved(r) {
  showChat();
  document.querySelectorAll(".crow").forEach((e)=>e.classList.toggle("on", e.dataset.id===r.id));
  add("user", "Run saved report: " + r.name);
  const thinking = metaLine("running against fresh data…");
  try {
    const res = await fetch(api("/api/reports/"+r.id+"/run"), { method:"POST", headers:{"content-type":"application/json"}, body:"{}" });
    const d = await res.json(); thinking.remove();
    if (!res.ok) return add("bot", "Error: " + d.error);
    if (d.artifact) d.artifact.reportId = d.reportId;
    renderAssistant(r.description || r.name, [d.artifact], { source: d.source, ts: d.ts });
    showReportTweaks(r);
  } catch (e) { thinking.remove(); add("bot", "Error running report."); }
}

// Re-run a saved report a different way, by talking (not a wizard). Chips send a
// natural-language variation through the chat, or re-run on live data.
function showReportTweaks(r) {
  const chips = el("div", "chips");
  const tweaks = [
    { t: "By month", q: `Take the "${r.name}" report but break it down by month.` },
    { t: "Last 2 years", q: `Show the "${r.name}" report for only the last two years.` },
    { t: "By state", q: `Show the "${r.name}" report broken down by state.` },
    { t: "Different range", q: `Re-run the "${r.name}" report for a date range I'll pick — ask me which.` },
  ];
  for (const tw of tweaks) { const b = el("button", "chip"); b.textContent = tw.t; b.onclick = () => { input.value = tw.q; composer.requestSubmit(); }; chips.appendChild(b); }
  log.appendChild(chips); scrollBottom();
}
$("genBtn").onclick = async () => {
  const b = $("genBtn"); b.disabled = true; b.textContent = "Analyzing your data…";
  try {
    const res = await fetch(api("/api/reports/generate"), { method: "POST" });
    const d = await res.json();
    if (!res.ok) { showChat(); metaLine("Could not generate reports: " + d.error); }
    else { await loadReports(); showChat(); metaLine("Created " + d.count + " reports from your data — see the sidebar."); }
  } catch (e) { metaLine("Report generation failed."); }
  b.disabled = false; b.textContent = "✨ Generate reports from my data";
};

composer.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim(); if (!text) return;
  showChat();
  add("user", text); history.push({ role:"user", content:text });
  input.value = ""; send.disabled = true;
  const thinking = metaLine("thinking…");
  try {
    const res = await fetch(api("/api/chat"), { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ messages: history, conversationId }) });
    const data = await res.json(); thinking.remove();
    if (data.error) add("bot", "Error: " + data.error);
    else {
      renderAssistant(data.reply, data.artifacts, { source: data.source, ts: data.ts });
      history.push({ role:"assistant", content:data.reply });
      const wasNew = !conversationId; conversationId = data.conversationId || conversationId;
      if (wasNew) $("viewTitle").textContent = text.slice(0, 60);
      loadConvos();
      showFollowups(text, data.reply);
    }
  } catch (err) { thinking.remove(); add("bot", "Network error: " + err); }
  finally { send.disabled = false; input.focus(); }
});
input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); composer.requestSubmit(); } });
$("newBtn").onclick = newChat;

// ---- global settings state (display names + source) ----
let displayNames = {};
const friendly = (real) => displayNames[real] || real;
async function loadConfigState() {
  try {
    const c = await (await fetch(api("/api/config"))).json();
    displayNames = c.displayNames || {};
  } catch {}
}
function loadDb() {
  fetch(api("/api/cube/status")).then((r)=>r.json()).then((s)=>{
    $("dbFoot").textContent = s.exists ? (s.tables.length + " tables · " + (s.totalRows||0).toLocaleString() + " rows · synced " + (s.syncedAt ? new Date(s.syncedAt).toLocaleDateString() : "?")) : "no local copy — open Settings to sync";
  }).catch(()=>{});
}

// ---- Settings & tables overlay (bottom-left, global) ----
$("settingsBtn").onclick = openSettings;
$("setClose").onclick = () => $("settingsOverlay").classList.remove("open");
async function openSettings() {
  $("setMsg").textContent = "Loading…";
  $("settingsOverlay").classList.add("open");
  try {
    const [tbl, status, cfg] = await Promise.all([
      fetch(api("/api/tables")).then(r=>r.json()),
      fetch(api("/api/cube/status")).then(r=>r.json()),
      fetch(api("/api/config")).then(r=>r.json()),
    ]);
    if (tbl.error) { $("setMsg").textContent = "Could not load tables: " + tbl.error; return; }
    displayNames = cfg.displayNames || displayNames;
    $("syncStatus").textContent = status.syncedAt ? ("last synced " + new Date(status.syncedAt).toLocaleString()) : "not synced yet";
    const synced = new Set((status.tables||[]).map(t=>t.name));
    const included = new Set(cfg.includeTables && cfg.includeTables.length ? cfg.includeTables : [...synced]);
    $("setSub").textContent = tbl.db || "";
    const tables = (tbl.tables||[]).slice().sort((a,b)=>(b.rowCount||0)-(a.rowCount||0));
    $("tableList").innerHTML = "";
    for (const t of tables) {
      const row = el("div","trow"); const on = synced.has(t.name);
      row.innerHTML = `<input type="checkbox" ${included.has(t.name)?"checked":""} data-t="${esc(t.name)}">`+
        `<input class="tname" value="${esc(friendly(t.name))}" data-real="${esc(t.name)}" title="friendly name">`+
        `<span class="treal">${esc(t.name)} · ${t.rowCount==null?"?":Number(t.rowCount).toLocaleString()} rows</span>`+
        `<span class="tbadge ${on?"on":"off"}">${on?"in local copy":"off"}</span>`;
      $("tableList").appendChild(row);
    }
    $("setMsg").textContent = "";
  } catch (e) { $("setMsg").textContent = "Error: " + (e.message || e); }
}
function checkedTables() { return [...$("tableList").querySelectorAll("input[type=checkbox]:checked")].map(c=>c.dataset.t); }
function editedNames() { const m={}; $("tableList").querySelectorAll(".tname").forEach(i=>{ const v=i.value.trim(); if (v && v!==i.dataset.real) m[i.dataset.real]=v; }); return m; }

$("syncBtn").onclick = () => { const inc = checkedTables(); if (!inc.length) { $("setMsg").textContent = "Pick at least one table."; return; } runSync(inc); };
$("setApply").onclick = async () => {
  const inc = checkedTables(); if (!inc.length) { $("setMsg").textContent = "Pick at least one table."; return; }
  await fetch(api("/api/config"), { method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify({ includeTables:inc, displayNames:editedNames() }) });
  await loadConfigState();
  runSync(inc);
};

// Live sync with per-table + overall progress on the main screen (SSE).
function showSync() { $("chatView").style.display="none"; $("dashView").style.display="none"; $("composer").style.display="none"; $("syncView").style.display=""; $("viewTitle").textContent="Syncing"; }
function runSync(tables) {
  $("settingsOverlay").classList.remove("open");
  showSync();
  $("syncTitle").textContent = "Building your local copy…";
  $("syncSub").textContent = "Pulling fresh data from FileMaker.";
  $("syncOverall").style.width = "0%";
  $("syncTables").innerHTML = "";
  const rows = {}; // name -> {el, bar, st, expected}
  let total = tables.length, done = 0;
  const rowFor = (name) => {
    if (rows[name]) return rows[name];
    const r = el("div","sync-t");
    r.innerHTML = `<div class="nm">${esc(friendly(name))}</div><div class="track"><div></div></div><div class="st">waiting…</div>`;
    $("syncTables").appendChild(r);
    return (rows[name] = { el:r, bar:r.querySelector(".track > div"), st:r.querySelector(".st"), expected:null });
  };
  const es = new EventSource(api("/api/cube/sync/stream?tables=" + encodeURIComponent(tables.join(","))));
  es.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    if (evt.type === "plan") {
      total = (evt.tables || []).length;
      for (const t of evt.tables) { const r = rowFor(t.name); r.expected = t.expected; }
    } else if (evt.type === "table-start") {
      const r = rowFor(evt.name); r.st.textContent = "syncing…";
    } else if (evt.type === "table-rows") {
      const r = rowFor(evt.name);
      r.st.textContent = Number(evt.rows).toLocaleString() + (r.expected ? " / " + Number(r.expected).toLocaleString() : "");
      if (r.expected) r.bar.style.width = Math.min(100, evt.rows / r.expected * 100) + "%";
    } else if (evt.type === "table-done") {
      const r = rowFor(evt.name); r.el.classList.add("done"); r.bar.style.width = "100%";
      r.st.textContent = evt.mode === "incremental"
        ? (Number(evt.changed || 0).toLocaleString() + " changed")
        : (Number(evt.rows).toLocaleString() + " rows");
      done++; $("syncOverall").style.width = Math.round(done / Math.max(1,total) * 100) + "%";
    } else if (evt.type === "drop") {
      const r = rowFor(evt.name); r.el.classList.add("dropped"); r.bar.style.width = "0%"; r.st.textContent = "removed";
    } else if (evt.type === "done") {
      es.close();
      $("syncOverall").style.width = "100%";
      $("syncTitle").textContent = "Local copy updated";
      $("syncSub").textContent = (evt.tables?evt.tables.length:0) + " tables · " + Number(evt.totalRows||0).toLocaleString() + " rows ready.";
      loadConfigState(); loadDb(); loadReports();
      setTimeout(() => { showChat(); resetChat(); }, 1600);
    } else if (evt.type === "error") {
      es.close(); $("syncTitle").textContent = "Sync problem"; $("syncSub").textContent = evt.message;
    }
  };
  es.onerror = () => { es.close(); if ($("syncTitle").textContent === "Building your local copy…") { $("syncSub").textContent = "Connection interrupted. Try again."; } };
}
$("resetBtn").onclick = async () => {
  if (!confirm("Reset to a fresh install? Clears reports, conversations, table selection, and the overview design.")) return;
  await fetch(api("/api/reset"), { method:"POST" });
  $("settingsOverlay").classList.remove("open");
  conversationId = null; await loadConfigState(); loadReports(); loadConvos(); loadDb(); resetChat();
};

// ---- Data browser (friendly names, no SQL) ----
$("dataBtn").onclick = async () => {
  const st = await (await fetch(api("/api/cube/status"))).json();
  $("dataSub").textContent = st.syncedAt ? "synced " + new Date(st.syncedAt).toLocaleString() : "not synced";
  const tbls = st.exists ? await (await fetch(api("/api/cube/tables"))).json() : [];
  $("dataTitle").textContent = "Data";
  $("dataList").innerHTML = tbls.length ? tbls.map((t)=>`<div class="p-row" data-t="${esc(t.name)}" style="cursor:pointer"><span>${esc(friendly(t.name))}</span><span class="sp"></span><span style="color:var(--muted)">${Number(t.rows).toLocaleString()} rows</span></div>`).join("") : '<p style="color:var(--muted)">No local copy yet. Open Settings to sync.</p>';
  $("dataList").querySelectorAll(".p-row").forEach((row)=>row.onclick = async () => {
    const name = row.dataset.t;
    const d = await (await fetch(api("/api/cube/table/"+encodeURIComponent(name)+"?limit=200"))).json();
    $("dataTitle").textContent = friendly(name); $("dataSub").textContent = d.rows.length + " rows (first 200)";
    const wrap = el("div"); wrap.appendChild(fullTable({ rows: d.rows }));
    $("dataList").innerHTML = ""; $("dataList").appendChild(wrap);
  });
  $("dataOverlay").classList.add("open");
};
$("dataClose").onclick = () => $("dataOverlay").classList.remove("open");

// ---- This-conversation menu (top-right) ----
const chatMenu = $("chatMenu");
$("chatMenuBtn").onclick = (e) => { e.stopPropagation(); chatMenu.style.display = chatMenu.style.display==="none"?"block":"none"; };
chatMenu.onclick = async (e) => {
  const a = e.target.dataset.a; if (!a) return; e.stopPropagation(); chatMenu.style.display="none";
  if (!conversationId) { alert("Ask something first, then you can rename, export, or delete this chat."); return; }
  if (a === "rename") { const nt = prompt("Rename conversation:", $("viewTitle").textContent); if (nt && nt.trim()) { await fetch(api("/api/conversations/"+conversationId), {method:"PATCH",headers:{"content-type":"application/json"},body:JSON.stringify({title:nt.trim()})}); $("viewTitle").textContent=nt.trim(); loadConvos(); } }
  else if (a === "export") { const c = await (await fetch(api("/api/conversations/"+conversationId))).json(); const lines=["# "+(c.title||"Conversation"),""]; for (const m of (c.messages||[])) lines.push((m.role==="user"?"**You**":"**Pythia**")+": "+(m.content||""),""); const aEl=el("a"); aEl.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/markdown"})); aEl.download=(c.title||"conversation").replace(/[^a-z0-9]+/gi,"-").slice(0,40)+".md"; document.body.appendChild(aEl); aEl.click(); aEl.remove(); }
  else if (a === "delete") { if (confirm("Delete this conversation?")) { await fetch(api("/api/conversations/"+conversationId), {method:"DELETE"}); conversationId=null; loadConvos(); resetChat(); } }
};

// ---- boot ----
loadConfigState().then(() => {
  loadDb(); loadReports(); loadConvos(); resetChat();
  if (location.hash === "#overview") showOverview();
  if (location.hash === "#settings") openSettings();
  if (qs.get("open")) openConvo(qs.get("open"));
});
</script>
