# Template — setup.mjs writes your fly.toml from this with YOUR app name.
# (fly.toml itself is gitignored: it is per-install, not part of the app.)
app = "{{APP_NAME}}"
primary_region = "{{REGION}}"

[build]

[env]
  DATA_DIR = "/data"

[mounts]
  source = "pythia_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
